version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: brick_bhatta_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/code/app
      - ./firebase-key.json:/code/firebase-key.json  # Mount Firebase key file
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/brick_bhatta_db
      FIREBASE_CREDENTIALS_PATH: /code/firebase-key.json
    depends_on:
      - db

volumes:
  postgres_data:
